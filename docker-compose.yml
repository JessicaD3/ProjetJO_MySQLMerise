services:
  mysql:
    image: mysql:8.0
    container_name: jo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      args:
        DB_HOST: ${DB_HOST}
        DB_PORT: ${DB_PORT}
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        DB_DW_NAME: ${DB_DW_NAME}
        JWT_SECRET: ${JWT_SECRET}
        APP_URL: ${APP_URL}
    container_name: jo_app
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_DW_NAME: ${DB_DW_NAME}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
      NODE_ENV: ${NODE_ENV}
    ports:
      - "3000:3000"

volumes:
  mysql_data: